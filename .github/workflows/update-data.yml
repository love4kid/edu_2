name: Update dashboard data

on:
  schedule:
    # 07:00 UTC = 16:00 KST (평일만) — 코스피 종가 확정 이후 하루 1회 갱신
    - cron: "0 7 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch KRX/DART data
        env:
          KRX_AUTH_KEY: ${{ secrets.KRX_AUTH_KEY }}
          DART_KEY: ${{ secrets.DART_KEY }}
        run: node scripts/fetch-data.js

      - name: Commit updated data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/summary.json
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "chore: update dashboard data [automated]"
          git push
